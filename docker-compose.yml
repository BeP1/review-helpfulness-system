services:
  db:
    image: postgres:16
    container_name: review_helpfulness_db
    restart: always
    environment:
      POSTGRES_DB: review_helpfulness
      POSTGRES_USER: review_user
      POSTGRES_PASSWORD: review_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U review_user -d review_helpfulness"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: review_helpfulness_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+psycopg://review_user:review_password@db:5432/review_helpfulness
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: review_helpfulness_frontend
    restart: always
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: