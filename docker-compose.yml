services:
  db:
    image: postgres:16
    container_name: review_helpfulness_db
    restart: always
    environment:
      POSTGRES_DB: review_helpfulness
      POSTGRES_USER: review_user
      POSTGRES_PASSWORD: review_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      #- ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U review_user -d review_helpfulness"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: review_helpfulness_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+psycopg://review_user:review_password@db:5432/review_helpfulness
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data: